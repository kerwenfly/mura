<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评委打分 - 多人在线实时评分系统</title>
    <script src="lib/tailwind.min.js"></script>
    <script src="lib/supabase.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen">
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="navbar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
                <span>评委打分系统</span>
            </a>
            <div id="userInfo" class="flex items-center gap-3">
                <span id="judgeName" class="text-muted hidden md:block"></span>
                <button id="logoutBtn" class="btn btn-secondary btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="hidden md:inline">退出</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-6">
        <div id="eventSelectSection" class="max-w-md mx-auto">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title text-center">选择活动</h2>
                </div>
                <div id="eventList" class="space-y-2">
                    <div class="empty-state py-4">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="loginSection" class="max-w-md mx-auto hidden">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title text-center">评委登录</h2>
                </div>
                <div class="text-center mb-4">
                    <span class="text-muted">当前活动：</span>
                    <span id="currentEventName" class="font-medium"></span>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">用户名</label>
                        <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        登录
                    </button>
                </form>
                <button id="backToEventBtn" class="btn btn-secondary btn-block mt-3">
                    返回选择活动
                </button>
            </div>
        </div>

        <div id="scoringSection" class="hidden">
            <div id="lockedAlert" class="hidden mb-4 p-4 rounded-lg bg-warning/20 border border-warning">
                <div class="flex items-center gap-2 text-warning">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span>评分已锁定，无法修改评分</span>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">当前选手</h3>
                    </div>
                    <div id="contestantInfo" class="flex flex-col items-center text-center">
                        <div class="avatar avatar-lg mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <h2 id="contestantName" class="text-2xl font-semibold mb-2">等待选手...</h2>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="badge badge-primary" id="contestantNumber">--</span>
                            <span class="text-muted" id="contestantDepartment">--</span>
                        </div>
                        <p class="text-muted" id="contestantDescription">暂无选手信息</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">评分</h3>
                    </div>
                    <div id="scoringArea">
                        <div class="score-slider-container mb-8">
                            <div class="score-value" id="scoreValue">0</div>
                            <input type="range" id="scoreSlider" class="form-slider" min="0" max="100" value="0" step="0.5">
                            <div class="score-marks">
                                <span>0</span>
                                <span>25</span>
                                <span>50</span>
                                <span>75</span>
                                <span>100</span>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button id="submitBtn" class="btn btn-cta btn-lg flex-1" disabled>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg>
                                <span id="submitBtnText">提交评分</span>
                            </button>
                        </div>
                        <div id="submittedInfo" class="hidden mt-4 text-center">
                            <span class="badge badge-success">已评分</span>
                        </div>
                    </div>
                    <div id="noContestantArea" class="hidden">
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            <p>暂无当前选手</p>
                            <p class="text-sm">请等待管理员选择选手</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mt-6">
                <div class="card-header">
                    <h3 class="card-title">已评分选手</h3>
                </div>
                <div id="scoredList" class="grid gap-3">
                    <div class="empty-state py-4">
                        <p class="text-muted">暂无已评分记录</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/judge.js"></script>
</body>
</html>
