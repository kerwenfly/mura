<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评委评分 - ScoreLive</title>
    <script src="lib/supabase.min.js"></script>
    <script src="lib/tailwind.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-slate-950">
    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 活动选择区域 -->
    <div id="eventSelectSection" class="min-h-screen flex flex-col">
        <!-- 导航栏 -->
        <nav class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 cursor-pointer">
                <div class="w-8 h-8 bg-gradient-to-br from-emerald-600 to-teal-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
                    </svg>
                </div>
                <span class="font-bold text-white">ScoreLive</span>
                <span class="text-slate-500 hidden sm:block">•</span>
                <span class="text-slate-400 text-sm hidden sm:block">评委入口</span>
            </a>
            <a href="index.html" class="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span class="hidden sm:block">首页</span>
            </a>
        </nav>

        <!-- 活动列表 -->
        <div class="flex-1 p-4 md:p-8 max-w-2xl mx-auto w-full">
            <h1 class="text-2xl font-bold text-white mb-1 mt-4">选择活动</h1>
            <p class="text-slate-400 text-sm mb-6">请选择您要参与评分的活动</p>
            <div id="eventList" class="space-y-3">
                <!-- 活动列表将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 登录区域 -->
    <div id="loginSection" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
                <div class="mb-5">
                    <div class="text-xs text-slate-500 mb-1">登录活动</div>
                    <div class="font-semibold text-white" id="currentEventName">活动名称</div>
                </div>

                <form id="loginForm" class="space-y-3">
                    <div>
                        <label class="form-label">用户名</label>
                        <input type="text" id="username" class="form-input" placeholder="输入用户名" required>
                    </div>
                    <div>
                        <label class="form-label">密码</label>
                        <div class="relative">
                            <input type="password" id="password" class="form-input pr-9" placeholder="输入密码" required>
                            <button type="button" id="togglePasswordBtn" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                                <svg class="w-3.5 h-3.5" id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                        登录
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <button id="backToEventBtn" class="text-sm text-slate-400 hover:text-white transition-colors">
                        ← 返回选择活动
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 评分区域 -->
    <div id="scoringSection" class="hidden min-h-screen flex flex-col">
        <!-- 导航栏 -->
        <nav class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 cursor-pointer">
                <div class="w-8 h-8 bg-gradient-to-br from-emerald-600 to-teal-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
                    </svg>
                </div>
                <span class="font-bold text-white">ScoreLive</span>
                <span class="text-slate-500 hidden sm:block">•</span>
                <span class="text-slate-400 text-sm hidden sm:block" id="navEventName">活动名称</span>
            </a>
            <div class="flex items-center gap-3">
                <span class="text-xs text-slate-400 hidden sm:block" id="judgeName">评委</span>
                <button id="logoutBtn" class="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span class="hidden sm:block">退出</span>
                </button>
            </div>
        </nav>

        <!-- 选手信息 -->
        <div class="bg-slate-900 border-b border-slate-800 px-4 py-4">
            <div id="contestantInfo" class="max-w-lg mx-auto">
                <div id="noContestantArea" class="flex items-center gap-3 text-slate-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span class="text-sm">等待选择选手...</span>
                </div>
                <div id="scoringArea" class="hidden flex items-center gap-4">
                    <div class="avatar avatar-lg shrink-0 bg-slate-700 flex items-center justify-center text-white font-bold text-lg" id="avatarContainer">
                        <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-xs text-slate-500" id="contestantNumber">#编号</span>
                            <span class="text-xs bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-full border border-indigo-500/30" id="roundBadge">轮次</span>
                            <span id="lockedAlert" class="hidden text-xs bg-red-500/10 text-red-400 px-2 py-0.5 rounded-full border border-red-500/20 flex items-center gap-1">
                                <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                                </svg>
                                已锁定
                            </span>
                        </div>
                        <h2 class="font-bold text-white text-lg leading-tight truncate" id="contestantName">选手姓名</h2>
                        <p class="text-sm text-slate-400 truncate" id="contestantDepartment">部门</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 评分主体 -->
        <div class="flex-1 flex flex-col items-center justify-center p-4 max-w-sm mx-auto w-full">
            <!-- 分数显示 -->
            <div class="w-full mb-4">
                <div id="scoreDisplay" class="text-center py-5 rounded-xl border-2 border-slate-700 bg-slate-900 transition-all">
                    <div class="text-5xl font-black tabular-nums text-slate-700" id="scoreValue">0</div>
                    <div id="submittedInfo" class="hidden text-xs text-slate-500 mt-1.5">已提交评分</div>
                </div>
            </div>

            <!-- 数字键盘 -->
            <div class="w-full space-y-2">
                <div class="flex gap-2">
                    <button class="numpad-btn flex-1" onclick="inputNumber('7')">7</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('8')">8</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('9')">9</button>
                </div>
                <div class="flex gap-2">
                    <button class="numpad-btn flex-1" onclick="inputNumber('4')">4</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('5')">5</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('6')">6</button>
                </div>
                <div class="flex gap-2">
                    <button class="numpad-btn flex-1" onclick="inputNumber('1')">1</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('2')">2</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('3')">3</button>
                </div>
                <div class="flex gap-2">
                    <button class="numpad-btn clear flex-1" onclick="clearScore()">C</button>
                    <button class="numpad-btn flex-1" onclick="inputNumber('0')">0</button>
                    <button class="numpad-btn flex-1" onclick="inputDecimal()">.</button>
                </div>
                <div class="flex gap-2">
                    <button class="numpad-btn flex-1" onclick="backspace()" style="background: rgba(245, 158, 11, 0.2); color: #fcd34d; border-color: rgba(245, 158, 11, 0.3);">
                        ⌫
                    </button>
                    <button id="submitBtn" class="numpad-btn submit flex-1" onclick="handleSubmitScore()">
                        提交
                    </button>
                </div>
            </div>

            <!-- 评分历史按钮 -->
            <button id="showHistoryBtn" class="mt-5 flex items-center gap-1.5 text-slate-500 hover:text-slate-300 text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                我的评分记录
            </button>
        </div>
    </div>

    <!-- 评分历史面板 -->
    <div id="historyPanel" class="fixed inset-x-0 bottom-0 bg-slate-900 border-t border-slate-800 max-h-[60vh] overflow-y-auto z-40 transform translate-y-full transition-transform duration-300">
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800 sticky top-0 bg-slate-900">
            <h3 class="font-semibold text-white text-sm">我的评分记录</h3>
            <button id="closeHistoryBtn" class="text-slate-400 hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="historyList" class="p-4 space-y-2">
            <!-- 历史记录将通过JS动态生成 -->
        </div>
    </div>

    <!-- 历史面板遮罩 -->
    <div id="historyOverlay" class="hidden fixed inset-0 bg-black/40 z-30"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/judge.js"></script>
</body>
</html>
