<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏显示 - 多人在线实时评分系统</title>
    <script src="lib/tailwind.min.js"></script>
    <script src="lib/supabase.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="display-container">
        <div id="eventSelectSection" class="display-content">
            <div class="max-w-md mx-auto w-full">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title text-center">选择活动</h2>
                    </div>
                    <div id="eventList" class="space-y-2">
                        <div class="empty-state py-4">
                            <p class="text-muted">加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="displaySection" class="hidden">
            <header id="displayHeader" class="py-3 md:py-4 px-4 md:px-6 border-b border-glass">
                <div class="flex items-center justify-center gap-3 md:gap-4">
                    <h1 class="text-center text-2xl md:text-3xl lg:text-4xl" id="eventTitle">多人在线实时评分系统</h1>
                    <span id="currentRoundBadge" class="badge badge-primary hidden"></span>
                </div>
            </header>

            <div class="display-content" id="displayContent">
                <div id="waitingMode" class="hidden text-center fade-in flex flex-col items-center justify-center min-h-screen">
                    <h1 id="waitingEventTitle" class="text-5xl md:text-6xl lg:text-7xl xl:text-8xl mb-8 text-center"></h1>
                    <div class="pulse">
                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-6 text-primary">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                    </div>
                    <h2 class="text-2xl md:text-3xl lg:text-4xl mb-4">等待开始</h2>
                    <p class="text-muted text-base md:text-lg">活动即将开始，请稍候...</p>
                </div>

                <div id="scoringMode" class="hidden w-full max-w-4xl mx-auto fade-in">
                    <div class="text-center mb-6 md:mb-8">
                        <div class="contestant-avatar mx-auto" id="scoringAvatar">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <h2 id="scoringName" class="text-2xl md:text-3xl lg:text-4xl mb-3">选手姓名</h2>
                        <div class="flex flex-col items-center justify-center gap-1 mb-4">
                            <span class="badge badge-primary text-base md:text-lg px-4 py-1" id="scoringNumber">01</span>
                            <span class="text-muted text-base md:text-lg" id="scoringDepartment">单位</span>
                        </div>
                        <p class="text-muted text-base md:text-lg max-w-xl mx-auto" id="scoringDescription">选手简介</p>
                    </div>

                    <div class="card">
                        <div class="text-center">
                            <div class="flex items-center justify-center gap-3 md:gap-4 mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary pulse">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span class="text-lg md:text-xl">评分进行中...</span>
                            </div>
                            <div class="flex items-center justify-center gap-4 md:gap-6">
                                <div class="text-center">
                                    <div class="text-3xl md:text-4xl font-bold text-primary" id="receivedCount">0</div>
                                    <div class="text-muted text-sm">已收评分</div>
                                </div>
                                <div class="text-2xl text-muted">/</div>
                                <div class="text-center">
                                    <div class="text-3xl md:text-4xl font-bold" id="totalCount">0</div>
                                    <div class="text-muted text-sm">评委总数</div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <div class="progress-bar">
                                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="resultMode" class="hidden w-full max-w-4xl mx-auto fade-in">
                    <div class="text-center mb-6 md:mb-8">
                        <div class="contestant-avatar mx-auto" id="resultAvatar">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <h2 id="resultName" class="text-2xl md:text-3xl lg:text-4xl mb-3">选手姓名</h2>
                        <div class="flex flex-col items-center justify-center gap-1 mb-4">
                            <span class="badge badge-primary text-base md:text-lg px-4 py-1" id="resultNumber">01</span>
                            <span class="text-muted text-base md:text-lg" id="resultDepartment">单位</span>
                        </div>
                    </div>

                    <div class="card mb-6">
                        <h3 class="text-base md:text-xl mb-4 text-center text-muted">评委评分</h3>
                        <div class="score-grid" id="scoreGrid"></div>
                    </div>

                    <div class="text-center slide-up">
                        <p class="text-muted text-base md:text-lg mb-2">本轮得分</p>
                        <div class="final-score count-up" id="finalScore">0.00</div>
                    </div>
                </div>

                <div id="finalMode" class="hidden w-full max-w-4xl mx-auto fade-in">
                    <h2 class="text-2xl md:text-3xl lg:text-4xl text-center mb-6 md:mb-8">最终排名</h2>
                    <div id="rankingList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/display.js"></script>
</body>
</html>
