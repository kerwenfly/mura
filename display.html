<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏显示 - 多人在线实时评分系统</title>
    <script src="lib/tailwind.min.js"></script>
    <script src="lib/supabase.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .display-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .display-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .contestant-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 60px rgba(15, 118, 110, 0.3);
        }
        @media (min-width: 768px) {
            .contestant-avatar {
                width: 200px;
                height: 200px;
            }
        }
        @media (min-width: 1024px) {
            .contestant-avatar {
                width: 250px;
                height: 250px;
            }
        }
        .contestant-avatar svg {
            width: 50%;
            height: 50%;
            color: white;
        }
        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 800px;
        }
        .score-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
        }
        .final-score {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @media (min-width: 768px) {
            .final-score {
                font-size: 7rem;
            }
        }
        @media (min-width: 1024px) {
            .final-score {
                font-size: 9rem;
            }
        }
        .rank-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }
        .rank-item:nth-child(1) {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.05));
            border-color: var(--gold);
        }
        .rank-item:nth-child(2) {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.1), rgba(192, 192, 192, 0.05));
            border-color: var(--silver);
        }
        .rank-item:nth-child(3) {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(205, 127, 50, 0.05));
            border-color: var(--bronze);
        }
        .rank-number {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 3rem;
        }
        .rank-medal {
            font-size: 2rem;
        }
        .progress-ring {
            width: 80px;
            height: 80px;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body>
    <div class="display-container">
        <div id="eventSelectSection" class="display-content">
            <div class="max-w-md mx-auto w-full">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title text-center">选择活动</h2>
                    </div>
                    <div id="eventList" class="space-y-2">
                        <div class="empty-state py-4">
                            <p class="text-muted">加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="displaySection" class="hidden">
            <header class="py-4 px-6 border-b border-[var(--border)]">
                <h1 class="text-center text-2xl md:text-3xl lg:text-4xl" id="eventTitle">多人在线实时评分系统</h1>
            </header>

        <div class="display-content" id="displayContent">
            <div id="waitingMode" class="text-center fade-in">
                <div class="pulse">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-6 text-primary">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <h2 class="text-3xl md:text-4xl mb-4">等待开始</h2>
                <p class="text-muted text-lg">活动即将开始，请稍候...</p>
            </div>

            <div id="scoringMode" class="hidden w-full max-w-4xl mx-auto fade-in">
                <div class="text-center mb-8">
                    <div class="contestant-avatar mx-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h2 id="scoringName" class="text-3xl md:text-4xl lg:text-5xl mb-3">选手姓名</h2>
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <span class="badge badge-primary text-lg px-4 py-1" id="scoringNumber">01</span>
                        <span class="text-muted text-lg" id="scoringDepartment">单位</span>
                    </div>
                    <p class="text-muted text-lg max-w-xl mx-auto" id="scoringDescription">选手简介</p>
                </div>

                <div class="card">
                    <div class="text-center">
                        <div class="flex items-center justify-center gap-4 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary pulse">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            <span class="text-xl">评分进行中...</span>
                        </div>
                        <div class="flex items-center justify-center gap-6">
                            <div class="text-center">
                                <div class="text-4xl font-bold text-primary" id="receivedCount">0</div>
                                <div class="text-muted">已收评分</div>
                            </div>
                            <div class="text-2xl text-muted">/</div>
                            <div class="text-center">
                                <div class="text-4xl font-bold" id="totalCount">0</div>
                                <div class="text-muted">评委总数</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="resultMode" class="hidden w-full max-w-4xl mx-auto fade-in">
                <div class="text-center mb-8">
                    <div class="contestant-avatar mx-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h2 id="resultName" class="text-3xl md:text-4xl lg:text-5xl mb-3">选手姓名</h2>
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <span class="badge badge-primary text-lg px-4 py-1" id="resultNumber">01</span>
                        <span class="text-muted text-lg" id="resultDepartment">单位</span>
                    </div>
                </div>

                <div class="card mb-6">
                    <h3 class="text-xl mb-4 text-center text-muted">评委评分</h3>
                    <div class="score-grid" id="scoreGrid">
                    </div>
                </div>

                <div class="text-center slide-up">
                    <p class="text-muted text-lg mb-2">最终得分</p>
                    <div class="final-score count-up" id="finalScore">0.00</div>
                </div>
            </div>

            <div id="finalMode" class="hidden w-full max-w-3xl mx-auto fade-in">
                <h2 class="text-3xl md:text-4xl text-center mb-8">最终排名</h2>
                <div id="rankingList">
                </div>
            </div>
        </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/display.js"></script>
</body>
</html>
