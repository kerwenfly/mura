<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级管理员 - ScoreLive</title>
    <script src="lib/supabase.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* 超级管理员专用紫色主题 */
        :root {
            --super-primary: #9333ea;
            --super-primary-light: #a855f7;
            --super-primary-dark: #7c3aed;
        }

        .super-gradient {
            background: linear-gradient(135deg, var(--super-primary), var(--super-primary-dark));
        }

        .super-gradient-light {
            background: linear-gradient(135deg, var(--super-primary-light), var(--super-primary));
        }

        .btn-super {
            background: linear-gradient(135deg, var(--super-primary), var(--super-primary-dark));
            color: white;
        }

        .btn-super:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--super-primary-light), var(--super-primary));
        }

        .form-radio:checked {
            background: var(--super-primary);
            border-color: var(--super-primary);
        }

        input[type="checkbox"]:checked {
            background: var(--super-primary);
            border-color: var(--super-primary);
        }

        /* 表格样式 */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 0.75rem 1.25rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #1e293b;
        }

        .admin-table td {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
        }

        .admin-table tbody tr:hover {
            background: rgba(30, 41, 59, 0.3);
        }

        /* 状态徽章 */
        .status-active {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-disabled {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-expired {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* 操作按钮 */
        .action-btn {
            padding: 0.375rem;
            border-radius: 0.375rem;
            color: #94a3b8;
            transition: all 0.2s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .action-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btn.danger:hover {
            color: #f87171;
        }

        .action-btn.success:hover {
            color: #6ee7b7;
        }

        /* 统计卡片 */
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: absolute;
            top: 33%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: rgba(147, 51, 234, 0.15);
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950">
    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 登录区域 -->
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
        <div class="bg-decoration"></div>

        <div class="w-full max-w-md relative z-10">
            <a href="index.html" class="flex items-center gap-1.5 text-slate-400 hover:text-white mb-6 transition-colors text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                返回首页
            </a>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 super-gradient rounded-xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Super Admin</h1>
                        <p class="text-slate-400 text-sm">系统管理门户</p>
                    </div>
                </div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="form-label">邮箱地址</label>
                        <input type="email" id="email" class="form-input" placeholder="superadmin@system.com" required>
                    </div>
                    <div>
                        <label class="form-label">密码</label>
                        <div class="relative">
                            <input type="password" id="password" class="form-input pr-10" placeholder="••••••••" required>
                            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                                <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-super w-full font-semibold py-2.5 rounded-lg transition-all duration-200 shadow-lg shadow-purple-900/30">
                        登录
                    </button>
                </form>

                <div class="mt-6 p-3 bg-slate-800/50 rounded-lg border border-slate-700/50">
                    <p class="text-xs text-slate-500 font-medium mb-1">演示账户</p>
                    <p class="text-xs text-slate-400">邮箱: <span class="text-slate-300">superadmin@system.com</span></p>
                    <p class="text-xs text-slate-400">密码: <span class="text-slate-300">super123</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理面板 -->
    <div id="adminSection" class="hidden flex flex-col min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 super-gradient rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <span class="font-bold text-white">ScoreLive</span>
                <span class="text-slate-500">•</span>
                <span class="text-slate-400 text-sm">Super Admin</span>
            </div>
            <button id="logoutBtn" class="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                退出
            </button>
        </nav>

        <!-- 主内容区 -->
        <div class="flex-1 overflow-auto">
            <div class="max-w-5xl mx-auto p-6">
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-white mb-1">系统概览</h1>
                    <p class="text-slate-400 text-sm">管理管理员账户并监控系统活动</p>
                </div>

                <!-- 统计卡片 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                    <div class="stat-card">
                        <div class="stat-icon bg-indigo-600">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="totalEvents">0</div>
                            <div class="stat-label">活动总数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-emerald-600">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="activeEvents">0</div>
                            <div class="stat-label">进行中活动</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-amber-600">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="totalContestants">0</div>
                            <div class="stat-label">选手总数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-rose-600">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="totalJudges">0</div>
                            <div class="stat-label">评委总数</div>
                        </div>
                    </div>
                </div>

                <!-- 管理员账户列表 -->
                <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                    <div class="flex items-center justify-between p-5 border-b border-slate-800">
                        <h2 class="font-semibold text-white">管理员账户</h2>
                        <button id="addAdminBtn" class="btn btn-super btn-sm">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            添加管理员
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>邮箱</th>
                                    <th>状态</th>
                                    <th>过期时间</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="adminList">
                                <tr>
                                    <td colspan="6" class="text-center text-slate-500 py-8">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑管理员模态框 -->
    <div id="adminModal" class="modal">
        <div class="modal-content max-w-md">
            <div class="modal-header">
                <h3 id="adminModalTitle" class="modal-title">添加管理员</h3>
                <button class="modal-close" onclick="closeAdminModal()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="adminForm" class="space-y-4">
                <input type="hidden" id="adminId">
                <div>
                    <label class="form-label">用户名</label>
                    <input type="text" id="adminUsername" class="form-input" required>
                </div>
                <div>
                    <label class="form-label">邮箱</label>
                    <input type="email" id="adminEmail" class="form-input" required>
                </div>
                <div>
                    <label class="form-label">密码</label>
                    <input type="password" id="adminPassword" class="form-input">
                    <p id="passwordHint" class="text-xs text-slate-500 mt-1 hidden">编辑时留空则不修改密码</p>
                </div>
                <div>
                    <label class="form-label">确认密码</label>
                    <input type="password" id="adminPasswordConfirm" class="form-input">
                </div>
                <div>
                    <label class="form-label">过期时间</label>
                    <input type="datetime-local" id="adminExpires" class="form-input">
                    <p class="text-xs text-slate-500 mt-1">留空表示永久有效</p>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="adminActive" checked class="w-4 h-4">
                    <label for="adminActive" class="text-sm text-slate-300">启用账户</label>
                </div>
                <div class="modal-footer">
                    <button type="button" onclick="closeAdminModal()" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn btn-super">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div id="confirmModal" class="modal">
        <div class="modal-content max-w-sm">
            <div class="modal-header">
                <h3 id="confirmTitle" class="modal-title">确认删除</h3>
            </div>
            <p id="confirmMessage" class="text-slate-400 my-4"></p>
            <div class="modal-footer">
                <button onclick="closeConfirmModal()" class="btn btn-secondary">取消</button>
                <button id="confirmBtn" class="btn btn-danger">删除</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/super.js"></script>
</body>
</html>
