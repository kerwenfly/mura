<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板 - 多人在线实时评分系统</title>
    <script src="lib/tailwind.min.js"></script>
    <script src="lib/supabase.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen">
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="navbar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                <span>控制面板</span>
            </a>
            <div class="flex items-center gap-3">
                <a href="display.html" target="_blank" class="btn btn-secondary btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span class="hidden md:inline">打开大屏</span>
                </a>
                <button id="logoutBtn" class="btn btn-secondary btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="hidden md:inline">退出</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-6">
        <div id="loginSection" class="max-w-md mx-auto">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title text-center">管理员登录</h2>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">邮箱</label>
                        <input type="email" id="email" class="form-input" placeholder="请输入管理员邮箱" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        登录
                    </button>
                </form>
            </div>
        </div>

        <div id="adminSection" class="hidden">
            <div class="card mb-6">
                <div class="card-header flex justify-between items-center">
                    <h3 class="card-title">活动管理</h3>
                    <div class="flex items-center gap-2">
                        <button id="manageEventsBtn" class="btn btn-secondary btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                            管理活动
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="form-label">当前活动</label>
                        <select id="eventSelect" class="form-input">
                            <option value="">请选择活动</option>
                        </select>
                    </div>
                    <div id="currentEventInfo" class="flex-1 hidden">
                        <div class="text-sm text-muted">活动状态</div>
                        <div id="eventStatus" class="font-medium"></div>
                    </div>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 space-y-6">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">显示模式</h3>
                        </div>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="displayMode" value="waiting" class="w-5 h-5 accent-[var(--primary)]">
                                <span>等待状态</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="displayMode" value="scoring" class="w-5 h-5 accent-[var(--primary)]">
                                <span>评分中</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="displayMode" value="result" class="w-5 h-5 accent-[var(--primary)]">
                                <span>显示结果</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="displayMode" value="final" class="w-5 h-5 accent-[var(--primary)]">
                                <span>最终排名</span>
                            </label>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">评分规则</h3>
                        </div>
                        <div class="space-y-3">
                            <label class="flex items-start gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="scoringRule" value="average_all" class="w-5 h-5 accent-[var(--primary)] mt-0.5">
                                <div>
                                    <div class="font-medium">平均分</div>
                                    <div class="text-sm text-muted">所有评委评分的平均值</div>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="scoringRule" value="average_trimmed" class="w-5 h-5 accent-[var(--primary)] mt-0.5">
                                <div>
                                    <div class="font-medium">去高低分平均</div>
                                    <div class="text-sm text-muted">去掉一个最高分和一个最低分后的平均值</div>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="scoringRule" value="median" class="w-5 h-5 accent-[var(--primary)] mt-0.5">
                                <div>
                                    <div class="font-medium">中位数</div>
                                    <div class="text-sm text-muted">所有评委评分的中位数</div>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 p-3 rounded-lg bg-background cursor-pointer hover:bg-surface-hover transition-colors">
                                <input type="radio" name="scoringRule" value="weighted" class="w-5 h-5 accent-[var(--primary)] mt-0.5">
                                <div>
                                    <div class="font-medium">加权平均</div>
                                    <div class="text-sm text-muted">根据评委权重计算加权平均分</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">评分控制</h3>
                        </div>
                        <div class="space-y-3">
                            <button id="lockBtn" class="btn btn-secondary btn-block">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <span id="lockBtnText">锁定评分</span>
                            </button>
                            <button id="resetScoresBtn" class="btn btn-danger btn-block">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                                </svg>
                                重置所有评分
                            </button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="card">
                        <div class="card-header flex justify-between items-center">
                            <h3 class="card-title">当前选手</h3>
                            <span id="currentStatus" class="badge badge-warning">未选择</span>
                        </div>
                        <div id="currentContestantPreview" class="text-center py-6">
                            <div class="empty-state">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                                <p>请从选手列表中选择当前选手</p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header flex justify-between items-center">
                            <h3 class="card-title">选手列表</h3>
                            <button id="addContestantBtn" class="btn btn-primary btn-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                添加选手
                            </button>
                        </div>
                        <div id="contestantList" class="space-y-2 max-h-80 overflow-y-auto">
                            <div class="empty-state py-4">
                                <p class="text-muted">暂无选手</p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header flex justify-between items-center">
                            <h3 class="card-title">评委列表</h3>
                            <button id="addJudgeBtn" class="btn btn-primary btn-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                添加评委
                            </button>
                        </div>
                        <div id="judgeList" class="space-y-2 max-h-60 overflow-y-auto">
                            <div class="empty-state py-4">
                                <p class="text-muted">暂无评委</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="contestantModal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="contestantModalTitle">添加选手</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeContestantModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="contestantForm">
                <div class="modal-body">
                    <input type="hidden" id="contestantId">
                    <input type="hidden" id="contestantAvatarUrl">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="form-group">
                                <label class="form-label" for="contestantName">姓名 *</label>
                                <input type="text" id="contestantNameInput" class="form-input" placeholder="请输入选手姓名" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="contestantNumber">编号 *</label>
                                <input type="number" id="contestantNumberInput" class="form-input" placeholder="请输入选手编号" min="1" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="contestantDept">单位</label>
                                <input type="text" id="contestantDept" class="form-input" placeholder="请输入单位名称">
                            </div>
                        </div>
                        <div>
                            <div class="form-group">
                                <label class="form-label">头像</label>
                                <div class="avatar-upload">
                                    <div class="avatar-preview" id="avatarPreview">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                            <circle cx="12" cy="7" r="4"></circle>
                                        </svg>
                                    </div>
                                    <div class="avatar-upload-actions">
                                        <input type="file" id="avatarInput" accept="image/*" class="hidden">
                                        <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('avatarInput').click()">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                                <polyline points="17 8 12 3 7 8"></polyline>
                                                <line x1="12" y1="3" x2="12" y2="15"></line>
                                            </svg>
                                            上传图片
                                        </button>
                                        <button type="button" class="btn btn-secondary btn-sm" id="clearAvatarBtn" onclick="clearAvatar()">
                                            清除
                                        </button>
                                        <span class="text-muted text-sm">建议尺寸 200x200，最大 200KB</span>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="contestantDesc">简介</label>
                                <textarea id="contestantDesc" class="form-input" rows="3" placeholder="请输入选手简介"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeContestantModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="judgeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="judgeModalTitle">添加评委</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeJudgeModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="judgeForm">
                <div class="modal-body">
                    <input type="hidden" id="judgeId">
                    <div class="form-group">
                        <label class="form-label" for="judgeUsernameInput">用户名 *</label>
                        <input type="text" id="judgeUsernameInput" class="form-input" placeholder="请输入登录用户名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="judgePasswordInput">密码 *</label>
                        <input type="text" id="judgePasswordInput" class="form-input" placeholder="请输入登录密码" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="judgeNumberInput">编号 *</label>
                        <input type="number" id="judgeNumberInput" class="form-input" placeholder="请输入评委编号" min="1" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeJudgeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay level-2" id="confirmModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="confirmTitle">确认操作</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeConfirmModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">确定要执行此操作吗？</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                <button type="button" id="confirmBtn" class="btn btn-danger">确认</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay level-2" id="eventModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="eventModalTitle">添加活动</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeEventModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="eventForm">
                <div class="modal-body">
                    <input type="hidden" id="eventId">
                    <div class="form-group">
                        <label class="form-label" for="eventNameInput">活动名称 *</label>
                        <input type="text" id="eventNameInput" class="form-input" placeholder="请输入活动名称" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventDescInput">活动描述</label>
                        <textarea id="eventDescInput" class="form-input" rows="3" placeholder="请输入活动描述"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="eventStartTime">开始时间</label>
                            <input type="datetime-local" id="eventStartTime" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="eventEndTime">结束时间</label>
                            <input type="datetime-local" id="eventEndTime" class="form-input">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeEventModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="eventListModal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3>活动管理</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeEventListModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="flex justify-end mb-4">
                    <button id="addEventBtn" class="btn btn-primary btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        创建活动
                    </button>
                </div>
                <div id="eventListContainer" class="space-y-2 max-h-96 overflow-y-auto">
                    <div class="empty-state py-4">
                        <p class="text-muted">暂无活动</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay level-2" id="copyEventModal">
        <div class="modal">
            <div class="modal-header">
                <h3>复制活动</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeCopyEventModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="copyEventForm">
                <div class="modal-body">
                    <input type="hidden" id="copyEventId">
                    <div class="form-group">
                        <label class="form-label" for="copyEventName">新活动名称 *</label>
                        <input type="text" id="copyEventName" class="form-input" placeholder="请输入新活动名称" required>
                    </div>
                    <p class="text-sm text-muted">复制活动将同时复制该活动下的所有选手和评委</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeCopyEventModal()">取消</button>
                    <button type="submit" class="btn btn-primary">复制</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
